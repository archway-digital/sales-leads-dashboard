name: Refresh Lead Dashboard

on:
  schedule:
    # 8:00 AM Central Time (UTC-5 standard / UTC-6 daylight)
    # Running at both 13:00 and 14:00 UTC covers CST and CDT year-round
    - cron: '0 13 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate dashboard
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python3 refresh.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: refresh lead dashboard [skip ci]"
          git push
